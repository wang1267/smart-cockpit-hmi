<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelliDash · 智能座舱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #04060d;
    --panel: #080c18;
    --card: #0d1022;
    --border: #141830;
    --cyan: #00d4ff;
    --blue: #3388ff;
    --green: #00e676;
    --orange: #ff6b35;
    --red: #ff2d55;
    --gold: #ffd740;
    --text: #e8eaef;
    --text2: #7a8090;
    --text3: #4a5060;
    --glow-cyan: 0 0 24px rgba(0,212,255,.25);
    --glow-orange: 0 0 24px rgba(255,107,53,.3);
    --glow-red: 0 0 24px rgba(255,45,85,.3);
    --font-en: 'Inter', sans-serif;
    --font-cn: 'Noto Sans SC', sans-serif;
    --radius: 16px;
    --radius-lg: 22px;
  }

  body {
    font-family: var(--font-cn);
    background: var(--bg);
    color: var(--text);
    height: 100vh; overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }

  /* ═══ 网格背景 ═══ */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; opacity: .025;
    background-image:
      linear-gradient(rgba(0,212,255,.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.4) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* ═══ 主布局 ═══ */
  .cockpit {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    grid-template-rows: 1fr 90px;
    gap: 10px; padding: 10px;
    height: 100vh;
  }

  /* ═══ 面板基类 ═══ */
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px;
    backdrop-filter: blur(10px);
    position: relative; overflow: hidden;
  }

  /* ═══ 左侧：电池+车辆信息 ═══ */
  .left-panel { grid-row: 1; display: flex; flex-direction: column; gap: 10px; }
  .info-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border: none; }
  .info-icon { font-size: 1.3rem; width: 36px; text-align: center; }
  .info-val { font-family: var(--font-en); font-size: 1.2rem; font-weight: 700; }
  .info-label { font-size: .72rem; color: var(--text3); }

  /* 电池进度条 */
  .battery-section { flex:1; display: flex; flex-direction: column; justify-content: center; }
  .battery-big {
    font-family: var(--font-en); font-size: 3.2rem; font-weight: 800;
    text-align: center; line-height: 1;
  }
  .battery-big.warn { color: var(--orange); text-shadow: var(--glow-orange); }
  .battery-big.crit { color: var(--red); text-shadow: var(--glow-red); animation: blink .5s infinite; }
  .battery-big.dead { color: var(--text3); }
  @keyframes blink { 50% { opacity: .3; } }

  .battery-bar-wrap {
    height: 8px; background: var(--border); border-radius: 4px;
    margin: 10px 0; overflow: hidden;
  }
  .battery-bar-fill {
    height: 100%; border-radius: 4px; transition: width .3s, background .3s;
  }

  .alert-msg {
    text-align: center; font-size: .78rem; font-weight: 600;
    padding: 6px 12px; border-radius: 20px; margin-top: 4px;
    position: relative;
  }
  .alert-msg .close-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.1); color: inherit; font-size: .7rem;
    cursor: pointer; line-height: 1;
  }
  .alert-msg.low { color: var(--gold); background: rgba(255,215,64,.08); }
  .alert-msg.crit { color: var(--orange); background: rgba(255,107,53,.1); }
  .alert-msg.emergency { color: var(--red); background: rgba(255,45,85,.1); animation: blink .5s infinite; }

  /* ═══ 中控：仪表盘 ═══ */
  .center-panel {
    grid-row: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .speed-display { text-align: center; }
  .speed-num {
    font-family: var(--font-en); font-size: 10rem; font-weight: 900;
    line-height: 1; letter-spacing: -6px;
    transition: color .3s, text-shadow .3s;
  }
  .speed-num.normal { color: var(--text); text-shadow: 0 0 40px rgba(255,255,255,.08); }
  .speed-num.fast { color: var(--cyan); text-shadow: var(--glow-cyan); }
  .speed-num.danger { color: var(--red); text-shadow: var(--glow-red); }

  .speed-label { font-size: .9rem; color: var(--text3); margin-top: 4px; }
  .speed-label span { color: var(--cyan); font-weight: 600; }

  /* 转速+功率小字 */
  .mini-gauges { display: flex; gap: 40px; margin-top: 12px; }
  .mini-g { text-align: center; }
  .mini-g .val { font-family: var(--font-en); font-size: 1.3rem; font-weight: 700; color: var(--text2); }
  .mini-g .lbl { font-size: .7rem; color: var(--text3); }

  /* 档位 */
  .gear-row { display: flex; gap: 8px; margin-top: 16px; }
  .gear-btn {
    width: 48px; height: 48px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--text3); font-family: var(--font-en);
    font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .gear-btn:hover { border-color: var(--cyan); }
  .gear-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,.08); box-shadow: var(--glow-cyan); }

  /* 充电按钮 */
  .charge-btn {
    margin-top: 12px; padding: 8px 24px; border-radius: 20px;
    border: 1.5px solid var(--green); background: transparent;
    color: var(--green); font-family: var(--font-cn); font-size: .85rem;
    font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .charge-btn:hover { background: rgba(0,230,118,.1); box-shadow: 0 0 20px rgba(0,230,118,.15); }
  .charge-btn.charging { border-color: var(--gold); color: var(--gold); animation: pulse-charge 1.5s infinite; }
  @keyframes pulse-charge {
    0%,100% { box-shadow: 0 0 8px rgba(255,215,64,.2); }
    50% { box-shadow: 0 0 24px rgba(255,215,64,.5); }
  }

  /* ═══ 右侧：油门刹车踏板 ═══ */
  .right-panel {
    grid-row: 1;
    display: flex; flex-direction: column; gap: 12px;
  }
  .pedal-section { flex: 1; }
  .pedal-label {
    font-size: .7rem; color: var(--text3); text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 6px; text-align: center;
  }
  .pedal-track {
    position: relative; width: 100%; height: calc(100% - 20px);
    background: var(--card); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .pedal-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    transition: height .1s; border-radius: 0 0 16px 16px;
  }
  .pedal-fill.throttle { background: linear-gradient(to top, var(--cyan), rgba(0,212,255,.3)); }
  .pedal-fill.brake { background: linear-gradient(to top, var(--orange), rgba(255,107,53,.3)); }
  .pedal-val {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-family: var(--font-en); font-size: 1.5rem; font-weight: 800;
  }
  .pedal-val.throttle { color: var(--cyan); text-shadow: var(--glow-cyan); }
  .pedal-val.brake { color: var(--orange); text-shadow: var(--glow-orange); }

  /* ═══ 底部控制栏 ═══ */
  .bottom-bar {
    grid-column: 1/-1; grid-row: 2;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex; align-items: center; padding: 0 20px;
    gap: 16px; backdrop-filter: blur(10px);
  }
  .bot-item { display: flex; align-items: center; gap: 6px; }
  .bot-icon { font-size: 1.1rem; }
  .bot-val { font-family: var(--font-en); font-weight: 600; font-size: .9rem; }
  .bot-label { font-size: .72rem; color: var(--text3); }
  .bot-sep { width: 1px; height: 30px; background: var(--border); }

  /* 空调条 */
  .ac-strip { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .ac-temp { font-family: var(--font-en); font-size: 1.2rem; font-weight: 700; color: var(--orange); }
  .ac-temp.off { color: var(--text3); }
  .ac-btn {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card); color: var(--text2); font-size: 1rem;
    cursor: pointer; transition: all .2s;
  }
  .ac-btn:hover { border-color: var(--orange); color: var(--orange); }
  .ac-power {
    padding: 6px 14px; border-radius: 16px; border: 1px solid var(--orange);
    background: transparent; color: var(--orange); font-family: var(--font-cn);
    font-size: .8rem; font-weight: 600; cursor: pointer;
  }
  .ac-power.on { background: rgba(255,107,53,.15); }

  /* 语音状态浮标 */
  .voice-indicator {
    position: fixed; bottom: 110px; right: 20px; z-index: 10;
    padding: 10px 18px; border-radius: 24px;
    font-family: var(--font-cn); font-size: .85rem; font-weight: 600;
    transition: all .3s; pointer-events: none;
  }
  .voice-indicator.idle { background: var(--card); border: 1px solid var(--border); color: var(--text3); }
  .voice-indicator.listening {
    background: rgba(0,212,255,.1); border: 1.5px solid var(--cyan);
    color: var(--cyan); animation: pulse-voice 1.5s infinite;
  }
  .voice-indicator.wake {
    background: rgba(0,230,118,.1); border: 1.5px solid var(--green);
    color: var(--green); box-shadow: 0 0 20px rgba(0,230,118,.2);
  }
  @keyframes pulse-voice {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,.4); }
    50% { box-shadow: 0 0 0 12px rgba(0,212,255,0); }
  }

  /* 断电遮罩 */
  .power-off-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(4,6,13,.92); display: flex;
    align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity .5s;
  }
  .power-off-overlay.active { opacity: 1; }
  .power-off-msg {
    text-align: center;
  }
  .power-off-msg .icon { font-size: 4rem; }
  .power-off-msg .title {
    font-size: 1.6rem; font-weight: 800; color: var(--red);
    margin: 12px 0;
  }
  .power-off-msg .sub {
    color: var(--text3); font-size: .9rem;
  }

  /* 响应式 */
  @media (max-width: 1000px) {
    .cockpit { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; overflow-y: auto; }
    .speed-num { font-size: 5rem; }
    .right-panel { flex-direction: row; }
    .pedal-track { height: 120px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="cockpit">

  <!-- ═══ 左侧面板 ═══ -->
  <div class="left-panel">
    <div class="panel" style="flex:1;display:flex;flex-direction:column;">
      <div style="font-family:var(--font-en);font-size:.7rem;color:var(--text3);letter-spacing:2px;">POWER</div>
      <div class="battery-section">
        <div class="battery-big" id="battery-big">100%</div>
        <div class="battery-bar-wrap"><div class="battery-bar-fill" id="battery-bar" style="width:100%;background:var(--green);"></div></div>
        <div class="alert-msg" id="alert-msg" style="display:none;"><span id="alert-text"></span><button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button></div>
        <div style="font-size:.8rem;color:var(--text3);text-align:center;margin-top:6px;">续航 <span id="range-display" style="color:var(--text2);font-weight:700;">433</span> km</div>
      </div>
    </div>

    <div class="panel" style="flex:1;">
      <div style="font-family:var(--font-en);font-size:.7rem;color:var(--text3);letter-spacing:2px;margin-bottom:8px;">INFO</div>
      <div class="info-row"><span class="info-icon">⚙</span><div><div class="info-label">电机转速</div><div class="info-val" id="rpm-display">0</div></div></div>
      <div class="info-row"><span class="info-icon">⚡</span><div><div class="info-label">瞬时功率</div><div class="info-val" id="power-display">0 kW</div></div></div>
      <div class="info-row"><span class="info-icon">🛣</span><div><div class="info-label">总里程</div><div class="info-val" id="odo-display">18,472</div></div></div>
      <div class="info-row"><span class="info-icon">🌡</span><div><div class="info-label">电池温度</div><div class="info-val" id="temp-display">310 K</div></div></div>
    </div>
  </div>

  <!-- ═══ 中控仪表 ═══ -->
  <div class="center-panel panel">
    <div class="speed-display">
      <div class="speed-num normal" id="speed-num">0</div>
      <div class="speed-label">km/h · <span id="gear-name">P 档</span> · <span id="cruise-indicator" style="display:none;color:var(--green);">⏱ 巡航中</span></div>
    </div>
    <div class="mini-gauges">
      <div class="mini-g"><div class="val" id="rpm-mini">0</div><div class="lbl">RPM</div></div>
      <div class="mini-g"><div class="val" id="ac-in-mini">26°</div><div class="lbl">车内温度</div></div>
      <div class="mini-g"><div class="val" style="color:var(--text3);" id="ac-out-mini">35°</div><div class="lbl">车外温度</div></div>
    </div>
    <div class="gear-row">
      <div class="gear-btn active" data-gear="P">P</div>
      <div class="gear-btn" data-gear="R">R</div>
      <div class="gear-btn" data-gear="N">N</div>
      <div class="gear-btn" data-gear="D">D</div>
    </div>
    <button class="charge-btn" id="charge-btn" onclick="toggleCharge()">⚡ 充电</button>
  </div>

  <!-- ═══ 右侧踏板 ═══ -->
  <div class="right-panel panel">
    <div class="pedal-section">
      <div class="pedal-label">油门 Throttle</div>
      <div class="pedal-track" id="throttle-track"
        onmousedown="startPedal('throttle',event)" onmousemove="movePedal('throttle',event)" onmouseup="stopPedal()" onmouseleave="stopPedal()"
        ontouchstart="startPedal('throttle',event)" ontouchmove="movePedal('throttle',event)" ontouchend="stopPedal()">
        <div class="pedal-fill throttle" id="throttle-fill" style="height:0%"></div>
        <div class="pedal-val throttle" id="throttle-val">0</div>
      </div>
    </div>
    <div class="pedal-section">
      <div class="pedal-label">刹车 Brake</div>
      <div class="pedal-track" id="brake-track"
        onmousedown="startPedal('brake',event)" onmousemove="movePedal('brake',event)" onmouseup="stopPedal()" onmouseleave="stopPedal()"
        ontouchstart="startPedal('brake',event)" ontouchmove="movePedal('brake',event)" ontouchend="stopPedal()">
        <div class="pedal-fill brake" id="brake-fill" style="height:0%"></div>
        <div class="pedal-val brake" id="brake-val">0</div>
      </div>
    </div>
  </div>

  <!-- ═══ 底部栏 ═══ -->
  <div class="bottom-bar">
    <div class="bot-item"><span class="bot-icon">🚗</span><span class="bot-val" id="bot-speed">0</span><span class="bot-label">km/h</span></div>
    <div class="bot-sep"></div>
    <div class="bot-item"><span class="bot-icon">🔋</span><span class="bot-val" id="bot-batt">100%</span></div>
    <div class="bot-sep"></div>
    <div class="bot-item"><span class="bot-icon">🛣</span><span class="bot-val" id="bot-odo">18,472 km</span></div>

    <div class="ac-strip">
      <span style="font-size:.75rem;color:var(--text3);">空调</span>
      <span class="ac-temp" id="ac-temp-display">26°</span>
      <button class="ac-btn" onclick="adjAc('temp',-1)">−</button>
      <span style="font-family:var(--font-en);font-weight:600;font-size:.85rem;" id="ac-set">24℃</span>
      <button class="ac-btn" onclick="adjAc('temp',1)">+</button>
      <button class="ac-power" id="ac-power-btn" onclick="toggleAc()">OFF</button>
    </div>
  </div>

</div>

<!-- 语音浮标 -->
<div class="voice-indicator idle" id="voice-indicator">🎤 说「小王小王」唤醒</div>

<!-- 断电遮罩 -->
<div class="power-off-overlay" id="power-overlay">
  <div class="power-off-msg">
    <div class="icon">🔋</div>
    <div class="title">电量耗尽</div>
    <div class="sub">请点击「⚡ 充电」按钮恢复供电</div>
  </div>
</div>

<script>
  /* ═══ 状态 ═══ */
  let state = {};
  let pedalActive = null;
  let wakeActive = false;

  async function fetchState() {
    try { const r = await fetch('/api/state'); state = await r.json(); render(); }
    catch(e) {}
  }

  async function api(url, data) {
    await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  }

  /* ═══ 渲染 ═══ */
  function render() {
    const speed = Math.round(state.speed);

    // 车速
    const sn = document.getElementById('speed-num');
    sn.textContent = speed;
    sn.className = 'speed-num';
    if (speed > 100) sn.classList.add('danger');
    else if (speed > 50) sn.classList.add('fast');
    else sn.classList.add('normal');

    document.getElementById('gear-name').textContent =
      {P:'P 档',R:'R 档',N:'N 档',D:'D 档'}[state.gear] || state.gear;

    // 定速巡航指示
    const ci = document.getElementById('cruise-indicator');
    if (state.cruise_on) {
      ci.style.display = 'inline';
      ci.textContent = '⏱ 巡航 ' + state.cruise_speed + 'km/h';
    } else {
      ci.style.display = 'none';
    }
    document.querySelectorAll('.gear-btn').forEach(b => b.classList.toggle('active', b.dataset.gear === state.gear));

    // 子仪表
    document.getElementById('rpm-mini').textContent = state.rpm;
    document.getElementById('ac-in-mini').textContent = state.ac_in + '°';
    document.getElementById('ac-out-mini').textContent = state.ac_out + '°';
    document.getElementById('rpm-display').textContent = state.rpm;
    document.getElementById('power-display').textContent = state.power.toFixed(1) + ' kW';
    document.getElementById('odo-display').textContent = state.odometer.toLocaleString('en-US',{maximumFractionDigits:0});
    document.getElementById('temp-display').textContent = state.battery_temp + ' K';

    // 电池
    const batt = state.battery;
    const bb = document.getElementById('battery-big');
    bb.textContent = Math.round(batt) + '%';
    bb.className = 'battery-big';
    if (state.power_off) bb.classList.add('dead');
    else if (batt <= 2 || state.battery_warning === 'emergency') bb.classList.add('crit');
    else if (batt <= 20 || state.battery_warning === 'critical') bb.classList.add('warn');

    const bbar = document.getElementById('battery-bar');
    bbar.style.width = batt + '%';
    if (batt <= 10) bbar.style.background = 'var(--red)';
    else if (batt <= 20) bbar.style.background = 'var(--orange)';
    else if (batt <= 40) bbar.style.background = 'var(--gold)';
    else bbar.style.background = 'var(--green)';

    document.getElementById('range-display').textContent = state.range;

    // 告警消息（每个阈值只展示一次，可手动关闭）
    const am = document.getElementById('alert-msg');
    if (state.battery_warning && state.battery_warning !== window._lastWarning) {
      window._lastWarning = state.battery_warning;
      const msgs = { low: '⚠ 电量较低，请及时充电', critical: '⚠ 电量严重不足！', emergency: '🚨 电量即将耗尽！！' };
      document.getElementById('alert-text').textContent = msgs[state.battery_warning] || '';
      am.className = 'alert-msg ' + state.battery_warning;
      am.style.display = 'block';
      clearTimeout(window._warningTimer);
    }

    // 踏板
    document.getElementById('throttle-fill').style.height = state.throttle + '%';
    document.getElementById('throttle-val').textContent = state.throttle > 0 ? state.throttle : '';
    document.getElementById('brake-fill').style.height = state.brake + '%';
    document.getElementById('brake-val').textContent = state.brake > 0 ? state.brake : '';

    // 充电按钮
    const cb = document.getElementById('charge-btn');
    if (state.charging) {
      cb.textContent = '⚡ 充电中 ' + Math.round(batt) + '%';
      cb.classList.add('charging');
    } else if (state.power_off || batt <= 2) {
      cb.textContent = '⚡ 立即充电';
      cb.classList.remove('charging');
      cb.style.borderColor = 'var(--red)'; cb.style.color = 'var(--red)';
    } else if (batt >= 100) {
      cb.textContent = '⚡ 电量已满';
      cb.classList.remove('charging');
      cb.style.borderColor = 'var(--green)'; cb.style.color = 'var(--green)';
    } else {
      cb.textContent = '⚡ 充电';
      cb.classList.remove('charging');
      cb.style.borderColor = 'var(--green)'; cb.style.color = 'var(--green)';
    }

    // 断电遮罩
    document.getElementById('power-overlay').classList.toggle('active', state.power_off);

    // 底部
    document.getElementById('bot-speed').textContent = speed;
    document.getElementById('bot-batt').textContent = Math.round(batt) + '%';
    document.getElementById('bot-odo').textContent = state.odometer.toLocaleString('en-US',{maximumFractionDigits:0}) + ' km';

    // 空调
    const at = document.getElementById('ac-temp-display');
    if (state.ac_on) { at.textContent = state.ac_in + '°'; at.classList.remove('off'); }
    else { at.textContent = 'OFF'; at.classList.add('off'); }
    document.getElementById('ac-set').textContent = state.ac_temp + '℃';
    const ap = document.getElementById('ac-power-btn');
    if (state.ac_on) { ap.textContent = 'ON'; ap.classList.add('on'); }
    else { ap.textContent = 'OFF'; ap.classList.remove('on'); }
  }

  /* ═══ 踏板交互 ═══ */
  function getPedalY(el, e) {
    const rect = el.getBoundingClientRect();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return Math.max(0, Math.min(100, Math.round((1 - (clientY - rect.top) / rect.height) * 100)));
  }

  function startPedal(type, e) { pedalActive = type; movePedal(type, e); }
  function movePedal(type, e) {
    if (pedalActive !== type) return;
    const val = getPedalY(e.currentTarget, e);
    api('/api/' + type, { value: val });
  }
  function stopPedal() { pedalActive = null; }

  /* ═══ 控制 ═══ */
  async function setGear(g) { await api('/api/gear', { gear: g }); }
  document.querySelectorAll('.gear-btn').forEach(b => {
    b.addEventListener('click', () => setGear(b.dataset.gear));
  });

  async function toggleCharge() {
    await api('/api/charge', { action: 'toggle' });
  }
  async function toggleAc() {
    await api('/api/ac', { on: !state.ac_on });
  }
  async function adjAc(field, delta) {
    const val = field === 'temp' ? state.ac_temp + delta : state.ac_fan + delta;
    await api('/api/ac', { [field]: val });
  }

  /* ═══ 语音唤醒 + 控制 ═══ */
  function startVoiceWake() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    const rec = new SR();
    rec.lang = 'zh-CN';
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 3;  // 返回多个候选，取最优匹配
    const indicator = document.getElementById('voice-indicator');

    // 偏置词汇表：提高车载指令识别率
    const biasWords = ['小王小王','挂P档','挂R档','挂N档','挂D档','停车','倒车','前进',
      '加速','减速','定速','巡航','保持','取消','油门','刹车',
      '空调','温度','风量','制冷','制热','自动','打开','关闭','度','档',
      '充电','停止','自动驾驶','导航','小王','快一点','慢一点',
      '二十','三十','四十','五十','六十','七十','八十','九十','一百','十六','十八','二十','二十二','二十四','二十六','二十八'];
    try {
      const grammar = '#JSGF V1.0; grammar commands; public <cmd> = ' + biasWords.join(' | ') + ';';
      const list = new window.SpeechGrammarList();
      list.addFromString(grammar, 1.0);
      rec.grammars = list;
    } catch(e) { /* 部分浏览器不支持，忽略 */ }

    let silenceTimer = null;
    function resetSilence() {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        wakeActive = false;
        indicator.textContent = '🎤 说「小王小王」唤醒';
        indicator.className = 'voice-indicator idle';
      }, 5000); // 5秒无新指令自动休眠
    }

    rec.onresult = (e) => {
      // 收集所有候选结果，选最匹配的
      let candidates = [];
      for (let i = e.resultIndex; i < e.results.length; i++) {
        for (let j = 0; j < e.results[i].length; j++) {
          const alt = e.results[i][j].transcript.replace(/\s/g, '');
          if (alt) candidates.push({ text: alt, confidence: e.results[i][j].confidence || 0 });
        }
      }
      // 按置信度排序，取最高
      candidates.sort((a, b) => b.confidence - a.confidence);
      let text = candidates.length > 0 ? candidates[0].text : '';
      // 如果置信度都不高，拼接所有候选找关键词
      if (!text || (candidates[0].confidence < 0.5)) {
        text = candidates.map(c => c.text).join('');
      }
      if (!text) return;

      // 检测唤醒词
      if (!wakeActive && text.includes('小王小王')) {
        wakeActive = true;
        indicator.textContent = '✅ 小王在听，请说指令…';
        indicator.className = 'voice-indicator wake';
        resetSilence();
        return;
      }

      // 唤醒后处理指令（仅处理最终结果）
      if (wakeActive && e.results[e.results.length-1].isFinal) {
        // 过滤掉纯唤醒词
        const cmd = text.replace('小王小王', '').trim();
        if (cmd) {
          indicator.textContent = '✅ 收到：「' + cmd + '」';
          indicator.className = 'voice-indicator wake';
          fetch('/api/voice', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text: cmd}) });
        } else {
          indicator.textContent = '✅ 小王在听，请说指令…';
          indicator.className = 'voice-indicator wake';
        }
        resetSilence(); // 收到指令后重新计时
      }
    };

    rec.onerror = (e) => {
      // 静默恢复，不打断状态
      if (e.error === 'no-speech' || e.error === 'aborted') return;
    };

    rec.onend = () => {
      // 自动重启，保持持续监听
      try { rec.start(); } catch(e) {}
    };

    try { rec.start(); resetSilence(); } catch(e) {}
  }

  /* ═══ 键盘 ═══ */
  document.addEventListener('keydown', e => {
    const gearMap = { p:'P', r:'R', n:'N', d:'D' };
    if (gearMap[e.key.toLowerCase()]) setGear(gearMap[e.key.toLowerCase()]);
    if (e.key === 'ArrowUp') api('/api/throttle', { value: Math.min(100, (state.throttle||0) + 20) });
    if (e.key === 'ArrowDown') api('/api/brake', { value: Math.min(100, (state.brake||0) + 20) });
    if (e.key === 'ArrowRight') api('/api/throttle', { value: 0 });
    if (e.key === 'ArrowLeft') api('/api/brake', { value: 0 });
  });

  /* ═══ 启动 ═══ */
  setInterval(fetchState, 150);
  fetchState();
  startVoiceWake();
</script>
</body>
</html>
