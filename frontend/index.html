<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能座舱 HMI · Xiaomi SU7 Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #f0f1f3;
    --surface: #ffffff;
    --surface2: #f7f7f9;
    --border: #e4e5e8;
    --orange: #ff6900;
    --orange-light: rgba(255,105,0,.08);
    --text: #1a1a1e;
    --text2: #6b6d73;
    --text3: #9a9ca3;
    --green: #34c759;
    --blue: #007aff;
    --red: #ff3b30;
    --radius-sm: 12px;
    --radius: 20px;
    --radius-lg: 28px;
    --font-en: 'Inter', sans-serif;
    --font-cn: 'Noto Sans SC', sans-serif;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  }

  body {
    font-family: var(--font-cn);
    background: #e8eaed;
    color: var(--text);
    height: 100vh; overflow: hidden;
    user-select: none; -webkit-user-select: none;
    display: flex; align-items: center; justify-content: center;
  }

  /* ═══ 座舱主容器 ═══ */
  .cockpit {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 1fr 80px;
    gap: 12px;
    width: 100vw; height: 100vh;
    padding: 12px;
    max-width: 1600px;
  }

  /* ═══ 左侧：仪表盘 ═══ */
  .cluster {
    grid-row: 1;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }

  /* 车速 — SU7 标志性大字 */
  .speed-hero {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .speed-big {
    font-family: var(--font-en); font-size: 8rem; font-weight: 800;
    line-height: 1; color: var(--text);
    transition: color .3s;
    letter-spacing: -4px;
  }
  .speed-big.fast { color: var(--orange); }
  .speed-big.danger { color: var(--red); }

  .speed-unit-row {
    font-size: .95rem; color: var(--text3); margin-top: 4px;
  }
  .speed-unit-row span { color: var(--text2); font-weight: 500; }

  /* 档位指示器 */
  .gear-strip {
    display: flex; gap: 6px; justify-content: center; margin: 16px 0;
  }
  .gear-dot {
    width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text3);
    font-family: var(--font-en); font-weight: 600; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
  }
  .gear-dot.active {
    background: var(--text); color: #fff; border-color: var(--text);
  }

  /* 续航环 */
  .range-ring-wrap {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 8px 0;
  }
  .range-ring {
    width: 56px; height: 56px; position: relative;
  }
  .range-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .range-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .range-fg { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .5s; }
  .range-fg.low { stroke: var(--orange); }
  .range-fg.crit { stroke: var(--red); }
  .range-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-en); font-size: .85rem; font-weight: 700; }

  .range-info { text-align: left; }
  .range-km { font-family: var(--font-en); font-size: 1.4rem; font-weight: 700; }
  .range-label { font-size: .75rem; color: var(--text3); }

  /* 底部信息 */
  .cluster-footer {
    display: flex; justify-content: space-around;
    padding-top: 12px; border-top: 1px solid var(--border);
    font-size: .75rem; color: var(--text3);
  }
  .cluster-footer .val { font-family: var(--font-en); font-weight: 600; color: var(--text2); }

  /* ═══ 右侧：中控屏 ═══ */
  .center-screen {
    grid-row: 1;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* 顶栏 */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar .title {
    font-family: var(--font-en); font-size: .8rem; font-weight: 600;
    color: var(--text3); letter-spacing: 2px; text-transform: uppercase;
  }
  .top-bar .time {
    font-family: var(--font-en); font-size: 1.1rem; font-weight: 600;
  }

  /* 信息卡片网格 */
  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr; gap: 12px;
  }
  .info-card {
    background: var(--surface2); border-radius: var(--radius);
    padding: 18px; display: flex; flex-direction: column;
    transition: background .2s; cursor: default;
  }
  .info-card:hover { background: var(--orange-light); }
  .card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .card-icon {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .card-title { font-size: .8rem; color: var(--text3); font-weight: 500; }
  .card-body { flex: 1; }
  .card-big {
    font-family: var(--font-en); font-size: 2.2rem; font-weight: 700;
    line-height: 1.1;
  }
  .card-sub { font-size: .8rem; color: var(--text3); margin-top: 4px; }
  .card-bar { margin-top: 8px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .card-fill { height: 100%; border-radius: 2px; transition: width .5s; }
  .card-fill.green { background: var(--green); }
  .card-fill.orange { background: var(--orange); }

  /* 空调卡片（横跨两列） */
  .card-grid .climate-card {
    grid-column: 1 / -1;
    display: flex; flex-direction: row; align-items: center; gap: 20px;
    background: var(--surface2); border-radius: var(--radius); padding: 16px 22px;
  }
  .climate-left { display: flex; align-items: center; gap: 16px; }
  .climate-emoji { font-size: 2.2rem; }
  .climate-temp {
    font-family: var(--font-en); font-size: 2.5rem; font-weight: 700;
  }
  .climate-temp.off { color: var(--text3); }
  .climate-controls {
    display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end;
  }
  .cl-btn {
    width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text);
    font-size: 1.1rem; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .cl-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
  .cl-power {
    padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--orange);
    background: transparent; color: var(--orange); font-family: var(--font-cn);
    font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .cl-power.on { background: var(--orange); color: #fff; }

  /* ═══ 底部控制栏 ═══ */
  .bottom-bar {
    grid-column: 1 / -1; grid-row: 2;
    background: var(--surface); border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; box-shadow: var(--shadow);
    gap: 16px;
  }
  .bottom-item {
    display: flex; align-items: center; gap: 8px;
  }
  .bottom-icon { font-size: 1.2rem; }
  .bottom-val { font-family: var(--font-en); font-weight: 600; font-size: .95rem; }
  .bottom-label { font-size: .75rem; color: var(--text3); }
  .bottom-sep { width: 1px; height: 28px; background: var(--border); }

  .voice-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text2); font-family: var(--font-cn); font-size: .85rem;
    cursor: pointer; transition: all .2s;
  }
  .voice-btn:hover { border-color: var(--orange); color: var(--orange); }
  .voice-btn.listening { border-color: var(--orange); background: var(--orange-light); animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,105,0,.3); }
    50% { box-shadow: 0 0 0 8px rgba(255,105,0,0); }
  }

  /* ═══ 响应式 ═══ */
  @media (max-width: 900px) {
    .cockpit { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; overflow-y: auto; }
    .speed-big { font-size: 5rem; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="cockpit">

  <!-- ═══ 左侧：仪表盘（方向盘后方悬浮屏） ═══ -->
  <div class="cluster">
    <div class="speed-hero">
      <div class="speed-big" id="speed-big">0</div>
      <div class="speed-unit-row">km/h · <span id="gear-name">P 档</span></div>
    </div>

    <div class="gear-strip">
      <div class="gear-dot active" data-gear="P">P</div>
      <div class="gear-dot" data-gear="R">R</div>
      <div class="gear-dot" data-gear="N">N</div>
      <div class="gear-dot" data-gear="D">D</div>
    </div>

    <div class="range-ring-wrap">
      <div class="range-ring">
        <svg viewBox="0 0 48 48">
          <circle class="range-bg" cx="24" cy="24" r="20"/>
          <circle class="range-fg" id="range-ring" cx="24" cy="24" r="20"
            stroke-dasharray="125.6" stroke-dashoffset="0"/>
        </svg>
        <div class="range-text" id="battery-pct">72</div>
      </div>
      <div class="range-info">
        <div class="range-km" id="range-num">312 <span style="font-size:.7rem;font-weight:400;color:var(--text3)">km</span></div>
        <div class="range-label">续航里程</div>
      </div>
    </div>

    <div class="cluster-footer">
      <div>总里程 <span class="val" id="odo-disp">18,472</span> km</div>
      <div>功率 <span class="val" id="power-disp">0</span> kW</div>
      <div>电池 <span class="val" id="temp-disp">340</span> K</div>
    </div>
  </div>

  <!-- ═══ 右侧：中控屏 ═══ -->
  <div class="center-screen">
    <div class="top-bar">
      <span class="title">Smart Cockpit</span>
      <span class="time" id="clock">12:00</span>
    </div>

    <div class="card-grid">
      <!-- 电池 -->
      <div class="info-card">
        <div class="card-header">
          <div class="card-icon" style="background:#e8f8ed;">🔋</div>
          <span class="card-title">动力电池</span>
        </div>
        <div class="card-body">
          <div class="card-big" id="battery-card">72<span style="font-size:1rem;color:var(--text3);">%</span></div>
          <div class="card-sub">SOC · 续航 <span id="range-card" style="font-weight:600;color:var(--text2);">312 km</span></div>
          <div class="card-bar"><div class="card-fill green" id="battery-bar" style="width:72%"></div></div>
        </div>
      </div>

      <!-- 温度 -->
      <div class="info-card">
        <div class="card-header">
          <div class="card-icon" style="background:#fff0e8;">🌡</div>
          <span class="card-title">温度信息</span>
        </div>
        <div class="card-body">
          <div class="card-big" id="temp-card">22<span style="font-size:1rem;color:var(--text3);">°</span></div>
          <div class="card-sub">车内 · 车外 <span id="outdoor-temp" style="font-weight:600;color:var(--text2);">35°</span></div>
          <div class="card-bar"><div class="card-fill orange" id="temp-bar" style="width:50%"></div></div>
        </div>
      </div>

      <!-- RMP -->
      <div class="info-card">
        <div class="card-header">
          <div class="card-icon" style="background:#e8eeff;">⚙</div>
          <span class="card-title">电机转速</span>
        </div>
        <div class="card-body">
          <div class="card-big" id="rpm-card">800</div>
          <div class="card-sub">RPM · 档位 <span id="gear-card" style="font-weight:600;color:var(--text2);">P</span></div>
        </div>
      </div>

      <!-- 功率 -->
      <div class="info-card">
        <div class="card-header">
          <div class="card-icon" style="background:#f0f0ff;">⚡</div>
          <span class="card-title">瞬时功率</span>
        </div>
        <div class="card-body">
          <div class="card-big" id="power-card">0<span style="font-size:1rem;color:var(--text3);">kW</span></div>
          <div class="card-sub">能量回收中</div>
        </div>
      </div>

      <!-- 气候控制 -->
      <div class="climate-card">
        <div class="climate-left">
          <div class="climate-emoji" id="climate-emoji">🌬</div>
          <div>
            <div class="climate-temp" id="climate-temp" style="color:var(--orange);">24°</div>
            <div style="font-size:.75rem;color:var(--text3);" id="climate-mode">AUTO</div>
          </div>
        </div>
        <div class="climate-controls">
          <button class="cl-btn" onclick="adjAc('temp',-1)">−</button>
          <span style="font-family:var(--font-en);font-weight:600;min-width:36px;text-align:center;" id="ac-set-temp">24℃</span>
          <button class="cl-btn" onclick="adjAc('temp',1)">+</button>
          <button class="cl-btn" onclick="adjAc('fan',-1)">◀</button>
          <span style="font-family:var(--font-en);font-weight:600;min-width:28px;text-align:center;" id="ac-fan">3</span>
          <button class="cl-btn" onclick="adjAc('fan',1)">▶</button>
          <button class="cl-power" id="ac-power-btn" onclick="toggleAc()">OFF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 底部控制栏 ═══ -->
  <div class="bottom-bar">
    <div class="bottom-item">
      <span class="bottom-icon">🚗</span>
      <span class="bottom-val" id="bot-speed">0</span>
      <span class="bottom-label">km/h</span>
    </div>
    <div class="bottom-sep"></div>
    <div class="bottom-item">
      <span class="bottom-icon">🔋</span>
      <span class="bottom-val" id="bot-battery">72%</span>
    </div>
    <div class="bottom-sep"></div>
    <div class="bottom-item">
      <span class="bottom-icon">🛣</span>
      <span class="bottom-val" id="bot-odo">18,472 km</span>
    </div>
    <div style="flex:1;"></div>
    <button class="voice-btn" id="voice-btn" onclick="startVoice()">
      🎤 语音控制
    </button>
  </div>

</div>

<script>
  /* ═══ 数据轮询 ═══ */
  let state = {};
  const RING = 2 * Math.PI * 20; // ≈125.6

  async function fetchState() {
    try {
      const r = await fetch('/api/state');
      state = await r.json();
      render();
    } catch(e) {}
  }

  function render() {
    const speed = Math.round(state.speed);

    // 车速大数字
    const sb = document.getElementById('speed-big');
    sb.textContent = speed;
    sb.classList.remove('fast','danger');
    if (speed > 100) sb.classList.add('danger');
    else if (speed > 60) sb.classList.add('fast');

    // 档位
    const gn = document.getElementById('gear-name');
    gn.textContent = {P:'P 档',R:'R 档',N:'N 档',D:'D 档'}[state.gear] || state.gear;
    document.querySelectorAll('.gear-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.gear === state.gear);
    });
    document.getElementById('gear-card').textContent = state.gear;

    // 续航环
    const batt = state.battery;
    const rr = document.getElementById('range-ring');
    rr.style.strokeDashoffset = RING * (1 - batt / 100);
    rr.classList.remove('low','crit');
    if (batt < 20) rr.classList.add('crit');
    else if (batt < 40) rr.classList.add('low');
    document.getElementById('battery-pct').textContent = Math.round(batt);
    document.getElementById('range-num').innerHTML = state.range + ' <span style="font-size:.7rem;font-weight:400;color:var(--text3)">km</span>';

    // 仪表盘底部
    document.getElementById('odo-disp').textContent = state.odometer.toLocaleString('en-US',{maximumFractionDigits:0});
    document.getElementById('power-disp').textContent = state.power.toFixed(1);
    document.getElementById('temp-disp').textContent = state.temperature;

    // 中控卡片
    document.getElementById('battery-card').innerHTML = Math.round(batt) + '<span style="font-size:1rem;color:var(--text3);">%</span>';
    document.getElementById('range-card').textContent = state.range + ' km';
    document.getElementById('battery-bar').style.width = batt + '%';
    const bb = document.getElementById('battery-bar');
    if (batt < 20) { bb.className = 'card-fill'; bb.style.background = 'var(--red)'; }
    else { bb.className = 'card-fill green'; bb.style.background = ''; }

    document.getElementById('temp-card').innerHTML = state.ac_in + '<span style="font-size:1rem;color:var(--text3);">°</span>';
    document.getElementById('outdoor-temp').textContent = state.ac_out + '°';
    document.getElementById('temp-bar').style.width = Math.min(100, Math.max(0, (state.ac_in / 45) * 100)) + '%';

    document.getElementById('rpm-card').textContent = state.rpm;
    document.getElementById('power-card').innerHTML = state.power.toFixed(1) + '<span style="font-size:1rem;color:var(--text3);">kW</span>';

    // 空调
    const ct = document.getElementById('climate-temp');
    const ce = document.getElementById('climate-emoji');
    const cm = document.getElementById('climate-mode');
    if (state.ac_on) {
      ct.textContent = state.ac_in + '°';
      ct.style.color = state.ac_mode === 'heat' ? 'var(--orange)' : state.ac_mode === 'cool' ? 'var(--blue)' : 'var(--orange)';
      ce.textContent = state.ac_mode === 'heat' ? '🔥' : state.ac_mode === 'cool' ? '❄' : '🌬';
      cm.textContent = {auto:'AUTO',cool:'制冷',heat:'制热',vent:'通风'}[state.ac_mode] + ' · 风量 ' + state.ac_fan;
    } else {
      ct.textContent = 'OFF'; ct.style.color = 'var(--text3)';
      ce.textContent = '⏻'; cm.textContent = '已关闭';
    }
    document.getElementById('ac-set-temp').textContent = state.ac_temp + '℃';
    document.getElementById('ac-fan').textContent = state.ac_fan;

    const pwr = document.getElementById('ac-power-btn');
    if (state.ac_on) { pwr.textContent = 'ON'; pwr.classList.add('on'); }
    else { pwr.textContent = 'OFF'; pwr.classList.remove('on'); }

    // 底部栏
    document.getElementById('bot-speed').textContent = speed;
    document.getElementById('bot-battery').textContent = Math.round(batt) + '%';
    document.getElementById('bot-odo').textContent = state.odometer.toLocaleString('en-US',{maximumFractionDigits:0}) + ' km';

    // 时钟
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }

  /* ═══ 控制 ═══ */
  async function setGear(g) {
    await fetch('/api/gear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gear:g})});
  }
  document.querySelectorAll('.gear-dot').forEach(b => {
    b.addEventListener('click',() => setGear(b.dataset.gear));
  });

  async function toggleAc() {
    await fetch('/api/ac',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({on:!state.ac_on})});
  }
  async function adjAc(field, delta) {
    const val = field === 'temp' ? state.ac_temp + delta : state.ac_fan + delta;
    await fetch('/api/ac',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[field]:val})});
  }

  /* ═══ 语音 ═══ */
  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('请用 Chrome 浏览器'); return; }
    const rec = new SR(); rec.lang = 'zh-CN'; rec.interimResults = false;
    const btn = document.getElementById('voice-btn');
    btn.textContent = '🎤 正在听...'; btn.classList.add('listening');
    rec.start();
    rec.onresult = async e => {
      const text = e.results[0][0].transcript;
      btn.textContent = '🎤 「' + text + '」';
      await fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      setTimeout(() => { btn.textContent = '🎤 语音控制'; btn.classList.remove('listening'); }, 2500);
    };
    rec.onerror = () => { btn.textContent = '🎤 语音控制'; btn.classList.remove('listening'); };
  }

  /* ═══ 键盘 ═══ */
  document.addEventListener('keydown', e => {
    const map = {p:'P',r:'R',n:'N',d:'D'};
    if (map[e.key.toLowerCase()]) setGear(map[e.key.toLowerCase()]);
    if (e.key === 'ArrowUp') adjAc('temp',1);
    if (e.key === 'ArrowDown') adjAc('temp',-1);
  });

  setInterval(fetchState, 200);
  fetchState();
</script>
</body>
</html>
